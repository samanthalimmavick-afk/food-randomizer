<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Food Randomizer</title>
</head>
<body>
    <script src="./script.js"></script>
    <div class="card">
        <img id="foodImg" src="https://cdn-icons-png.flaticon.com/512/857/857681.png" alt="Fork and spoon on plate">
        <h1 id="foodName">Food of the Day</h1>
        <p>Select food of the day!</p>
        <button onclick="randFood()">Randomize Food</button>
        <br>
        <img id="drinkImg" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ8M3ryWk9vekFB4v8IvM2Jxv-JZ3UvYT2mSg&s" alt="An empty glass.">
        <h1 id="drinkName">Your Drink</h1>
        <p>Select your drink!</p>
        <button onclick="randDrink()">Randomize Drink</button>
    </div>
</body>
</html>
